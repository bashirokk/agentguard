<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">AgentGuard scan demo</title>
  <desc id="desc">Terminal showing critical, high, and medium AI agent security findings.</desc>
  <rect width="1200" height="620" rx="22" fill="#07111f"/>
  <rect width="1200" height="54" rx="22" fill="#111c2e"/>
  <rect y="32" width="1200" height="22" fill="#111c2e"/>
  <circle cx="30" cy="27" r="8" fill="#fb7185"/><circle cx="56" cy="27" r="8" fill="#fbbf24"/><circle cx="82" cy="27" r="8" fill="#34d399"/>
  <g font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="21">
    <text x="36" y="94" fill="#94a3b8">$</text><text x="62" y="94" fill="#f8fafc">agentguard scan ./my-agent</text>
    <text x="36" y="140" fill="#22d3ee" font-weight="700">AgentGuard</text><text x="170" y="140" fill="#94a3b8"> AI Agent Security Scanner</text>
    <text x="36" y="194" fill="#fb7185" font-weight="700">CRITICAL</text><text x="170" y="194" fill="#f8fafc">AG001  Hardcoded secret</text>
    <text x="170" y="226" fill="#94a3b8">agent.py:8  A likely OpenAI API key is embedded directly in source.</text>
    <text x="170" y="258" fill="#67e8f9">Fix: rotate it and load the replacement from a secret manager.</text>
    <text x="36" y="316" fill="#fb7185" font-weight="700">HIGH</text><text x="170" y="316" fill="#f8fafc">AG004  Untrusted content enters prompt</text>
    <text x="170" y="348" fill="#94a3b8">research.py:41  Web content is interpolated into agent instructions.</text>
    <text x="170" y="380" fill="#67e8f9">Fix: separate data from instructions and validate tool calls independently.</text>
    <text x="36" y="438" fill="#fbbf24" font-weight="700">MEDIUM</text><text x="170" y="438" fill="#f8fafc">AG007  Tool input lacks validation</text>
    <text x="170" y="470" fill="#94a3b8">tools.ts:17  Tool definition has no nearby input schema.</text>
    <text x="170" y="502" fill="#67e8f9">Fix: attach a strict JSON Schema and reject unknown fields.</text>
    <text x="36" y="566" fill="#94a3b8">Scanned</text><text x="132" y="566" fill="#f8fafc" font-weight="700">27 files</text><text x="240" y="566" fill="#94a3b8">with 10 rules in 84ms ·</text><text x="530" y="566" fill="#fb7185">1 critical · 1 high</text><text x="765" y="566" fill="#fbbf24">· 1 medium</text>
  </g>
</svg>
