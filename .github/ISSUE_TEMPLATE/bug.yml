name: Bug report
description: Report reproducible incorrect behavior (not a vulnerability)
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: For security vulnerabilities, use private vulnerability reporting instead.
  - type: input
    id: version
    attributes:
      label: AgentGuard version
      placeholder: 0.1.0
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal synthetic reproduction
      description: Do not include credentials or private source code.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options: [Linux, macOS, Windows, Docker, Other]
    validations:
      required: true
